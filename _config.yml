# 网站基础配置
title: 我的个人博客
subtitle: 记录生活，分享技术
description: 一个简洁优雅的个人博客，记录技术学习与生活感悟
keywords: 博客,技术,分享,个人博客
author: 你的名字
language: zh-CN
timezone: Asia/Shanghai

# 网站URL配置
url: https://yourusername.github.io
root: /
permalink: posts/:abbrlink.html
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# 目录配置
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# 文章配置
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# 主页设置
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# 分类与标签
default_category: uncategorized
category_map:
tag_map:

# 归档配置
archive_generator:
  enabled: true
  per_page: 20
  yearly: true
  monthly: true
  daily: false
  order_by: -date

# 标签配置
tag_generator:
  enable: true
  per_page: 20
  order_by: -date

# 分类配置
category_generator:
  enable: true
  per_page: 20
  order_by: -date

# 元数据元素
meta_generator: true

# 日期时间格式
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

# 分页配置
per_page: 10
pagination_dir: page

# 扩展插件
theme: butterfly

# 部署配置
deploy:
  type: git
  repo: https://github.com/yourusername/yourusername.github.io.git
  branch: main

# 站点地图
sitemap:
  path: sitemap.xml

# RSS订阅
feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content:
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date
  icon: icon.png

# 搜索功能
search:
  path: search.xml
  field: post
  content: true
  format: html

# 文章链接缩短
abbrlink:
  alg: crc32
  rep: hex

# 文章字数统计
wordcount: true

# 文章元数据
post_meta:
  page:
    date_type: both
    date_format: relative
    categories: true
    tags: true
  post:
    date_type: both
    date_format: relative
    categories: true
    tags: true

#nofollow配置
nofollow:
  enable: true
  field: site
  exclude: 
    - 'yourusername.github.io'