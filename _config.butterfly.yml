# Butterfly主题配置

# 导航菜单
menu:
  首页: / || fas fa-home
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tags
  归档: /archives/ || fas fa-archive
  关于: /about/ || fas fa-heart

# 代码复制按钮
code_copy:
  enable: true
  show_result: true
  style: flat

# 代码块设置
highlight_theme:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''

# 社交链接
social:
  fab fa-github: https://github.com/yourusername || Github
  fab fa-weixin: /images/qr.png || 微信

# 头像
avatar:
  img: /images/avatar.png
  effect: false

# 页面加载动画
preloader:
  enable: true
  source: 1

# 首页个人信息卡片
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  card_author:
    enable: true
    description: 热爱技术，热爱生活
  card_announcement:
    enable: true
    content: 欢迎来到我的博客！
  card_recent_post:
    enable: true
    limit: 5
  card_categories:
    enable: true
    limit: 8
  card_tags:
    enable: true
    limit: 40
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true

# 运行时间
runtimeshow:
  enable: true
  publish_date: 2024-01-01 00:00:00

# 访问量统计
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# 文章元信息
post_meta:
  page:
    date_type: both
    date_format: relative
    categories: true
    tags: true
  post:
    date_type: both
    date_format: relative
    categories: true
    tags: true

# 版权信息
post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 文章打赏
reward:
  enable: false
  text:
  QR_code:
    - img: /images/wechat.png
      link:
      text: 微信赞赏
    - img: /images/alipay.png
      link:
      text: 支付宝赞赏

# 相关文章
related_post:
  enable: true
  limit: 6
  date_type: created

# 文章锚点
anchor:
  button:
    enable: true
    icon: # 设置图标
  scroll:
    enable: true
    effect: fade

# 代码块高度限制
code_word_limit: false

# TOC目录
toc:
  enable: true
  number: true
  auto_open: true
  expand_btn: true

# 阅读更多按钮
readmore:
  enable: true
  height: 300px
  content: '<i class="fas fa-angle-down" aria-hidden="true"></i>'

# 图片懒加载
lazyload:
  enable: true
  field: site
  placeholder:
  blur: false

# 图片灯箱
lightbox: false

# Pjax
pjax:
  enable: true
  exclude:
    - /music/
    - /no-pjax/

# Inject注入
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
  bottom:
    - <script src="/js/custom.js"></script>

# 评论系统 (使用Giscus)
comments:
  active: giscus
  giscus:
    repo: yourusername/yourusername.github.io
    repo_id: # 从giscus配置获取
    category: Announcements
    category_id: # 从giscus配置获取
    theme: light
    theme_dark: dark
    mapping: pathname
    reactions_enabled: 1
    emit_metadata: 0
    lang: zh-CN

# 搜索系统
algolia_search:
  enable: false
  hits:
    per_page: 10

local_search:
  enable: true
  trigger: auto
  top_n_per_article: 1
  unescape: false
  preload: false

# 网站背景
background: none

# footer设置
footer:
  owner:
    enable: true
    since: 2024
  custom_text:
  copyright: true

# 首页top_img
index_top_img: /images/default-cover.svg

# 文章默认top_img
default_top_img: /images/default-cover.svg

# 404页面
error_404:
  enable: true
  subtitle: "页面未找到"
  background: /images/default-cover.svg

# 分析统计
google_analytics:
baidu_analytics:

# CSS前缀
css_prefix: false

# Open Graph
Open_Graph_meta:
  enable: true
  option:

# 站点验证
site_verification:
  - name: google_site_verification
    content:
  - name: baidu_site_verification
    content:

# Dark Mode
darkmode:
  enable: true
  button: true
  auto_change: true
  start: 21
  end: 6

# 主页文章节选
index_post_content:
  method: 3
  length: 500

# 文章封面
post_cover:
  enable: true
  default_cover:
    - /images/default-cover.jpg

# 文章首页默认封面
default_cover:
  - /images/default-cover.jpg

# 文章排版
post:
  meta:
    date_type: both
    date_format: relative
    categories: true
    tags: true

# 网站图标
favicon: /favicon.ico

# 背景特效
canvas_ribbon:
  enable: false
  size: 150
  alpha: 0.6
  zIndex: -1

canvas_fluttering_ribbon:
  enable: false
  mobile: false

canvas_nest:
  enable: false
  color: 0,0,255
  opacity: 0.7
  zIndex: -1
  count: 99

# 美化/特效
beautify:
  enable: false
  field: post
  title-prefix-icon: '\f0c1'
  title-prefix-icon-color: '#F47466'